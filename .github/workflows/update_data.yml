name: Weekly Data Update
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install requests pandas openpyxl matplotlib folium
      - run: python main.py
      - run: python map.py
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dhaka_restaurants.csv dhaka_restaurants.xlsx charts/ dhaka_restaurants_map.html
          git diff --staged --quiet || git commit -m "Auto-update"
          git push
