name: Weekly Data Update

on:
  schedule:
    - cron: "0 0 * * 1"  # Every Monday at midnight UTC
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas openpyxl matplotlib folium

      - name: Run data collection
        run: python main.py

      - name: Regenerate map
        run: python map.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dhaka_restaurants.csv dhaka_restaurants.xlsx charts/ dhaka_restaurants_map.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%Y-%m-%d')"
          git push
```

---

## Step 3: Add a `requirements.txt` file

GitHub Actions needs to know which libraries to install. Create a new file called `requirements.txt` in your project folder:
```
requests
pandas
openpyxl
matplotlib
folium
python-telegram-bot