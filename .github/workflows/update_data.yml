name: Weekly Data Update

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas openpyxl matplotlib folium

      - name: Run data collection
        run: python main.py

      - name: Regenerate map
        run: python map.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dhaka_restaurants.csv dhaka_restaurants.xlsx charts/ dhaka_restaurants_map.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%Y-%m-%d')"
          git push